<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeEmu - Discover Anime</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0a0a0f;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111827;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:2rem;
font-weight:bold;
color:#00d4ff;
}

.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url("https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=1600");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:4rem;
margin-bottom:15px;
}

.hero p{
font-size:1.2rem;
color:#ccc;
margin-bottom:20px;
}

.search-box{
width:90%;
max-width:600px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

.section-title{
padding:30px 8%;
font-size:2rem;
}

.anime-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
padding:0 8% 50px;
}

.card{
background:#151b26;
border-radius:15px;
overflow:hidden;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h3{
font-size:1rem;
margin-bottom:8px;
}

.info p{
color:#bfbfbf;
font-size:.9rem;
}

footer{
text-align:center;
padding:30px;
background:#111827;
color:#999;
}

.loading{
text-align:center;
padding:50px;
font-size:20px;
}
</style>
</head>
<body>

<nav>
<div class="logo">AnimeEmu</div>
</nav>

<section class="hero">
<h1>AnimeEmu</h1>
<p>Discover Trending Anime Instantly</p>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search anime...">
</div>
</section>

<h2 class="section-title">🔥 Trending Anime</h2>

<div id="animeGrid" class="anime-grid">
<div class="loading">Loading Anime...</div>
</div>

<footer>
© 2026 AnimeEmu
</footer>

<script>
const animeGrid = document.getElementById("animeGrid");
const searchInput = document.getElementById("searchInput");

async function loadAnime(search=""){

const query = `
query ($search: String){
Page(page:1, perPage:24){
media(
type:ANIME,
search:$search,
sort:TRENDING_DESC
){
id
episodes
averageScore
title{
romaji
english
}
coverImage{
extraLarge
}
}
}
}
`;

try{

const response = await fetch(
"https://graphql.anilist.co",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Accept":"application/json"
},
body:JSON.stringify({
query,
variables:{search:search || null}
})
}
);

const data = await response.json();

displayAnime(data.data.Page.media);

}catch(error){

animeGrid.innerHTML =
"<h2>Failed To Load Anime</h2>";

console.error(error);
}
}

function displayAnime(animes){

animeGrid.innerHTML="";

animes.forEach(anime=>{

const title =
anime.title.english ||
anime.title.romaji;

animeGrid.innerHTML += `
<div class="card">
<img src="${anime.coverImage.extraLarge}">
<div class="info">
<h3>${title}</h3>
<p>⭐ ${anime.averageScore || "N/A"}</p>
<p>Episodes: ${anime.episodes || "?"}</p>
</div>
</div>
`;

});
}

searchInput.addEventListener("input",()=>{

const value = searchInput.value.trim();

loadAnime(value);

});

loadAnime();

setInterval(()=>{
loadAnime(searchInput.value);
},300000);
</script>

</body>
</html>
